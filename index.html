    <main>
        <section>
            <h2>Javascript(if, for, while)</h2>

            <!-- HTMLからJavascriptの関数を実行する -->
            <!-- ボタンとonclick属性を使うのが一番簡単 -->
            <button onclick="sayHello(0)">日本語</button>
            <button onclick="sayHello(1)">英語</button>
            <button onclick="sayHello(2)">フランス語</button>
            <button onclick="sayHello(3)">スペイン語</button>
            <button onclick="sayHello(4)">中国語</button>

            <!-- いろいろな言語の挨拶を表示(Javascript側から操作する) -->
            <p id="say_hello">ここに各言語の挨拶が表示されます.</p>
        </section>
    </main>
